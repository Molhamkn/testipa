name: Build iOS IPA

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install

      - name: Build iOS
        run: |
          cd ios/App
          xcodebuild -project App.xcodeproj -scheme App -configuration Debug -destination generic/platform=iOS CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO archive -archivePath App.xcarchive 2>&1 || true

      - name: Create IPA
        run: |
          cd ios/App
          ls -la
          ls -la App.xcarchive/
          ls -la App.xcarchive/Products/ 2>/dev/null || echo "No Products"
          ls -la App.xcarchive/Products/Application/ 2>/dev/null || echo "No Application"
          mkdir -p Payload
          cp -R App.xcarchive/Products/Application/*.app Payload/ 2>/dev/null || echo "Copy failed"
          cd Payload
          zip -r ../App.ipa .

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: app.ipa
          path: ios/App/Output/*.ipa
