name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install

      - name: Add iOS platform
        run: npx cap add ios

      - name: Install CocoaPods
        run: cd ios/App && pod install

      - name: Build iOS
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Debug -destination generic/platform=iOS CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO build

      - name: Create IPA
        env:
          PRODUCT_BUILT: build/Build/Products/Debug-iphoneos/App.app
        run: |
          cd ios/App
          mkdir -p Payload
          cp -r "$PRODUCT_BUILT" Payload/App.app
          cd Payload
          zip -r ../App.ipa .

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: app.ipa
          path: ios/App/App.ipa
