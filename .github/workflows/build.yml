name: Build iOS IPA

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install

      - name: Build iOS
        run: |
          cd ios/App
          xcodebuild -project App.xcodeproj -scheme App -configuration Debug -destination generic/platform=iOS CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO -derivedDataPath build -skipPackagePluginValidation -skipMacroValidation build 2>&1 | tail -50

      - name: Create IPA
        run: |
          cd ios/App
          mkdir -p Payload
          cp -r build/Build/Products/Debug-iphoneos/App.app Payload/App.app 2>/dev/null || cp -r build/Build/Products/*/App.app Payload/App.app
          cd Payload
          zip -r ../App.ipa .

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: app.ipa
          path: ios/App/App.ipa
