name: Build iOS IPA

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install

      - name: Build iOS
        run: |
          cd ios/App
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -skipPackagePluginValidation \
            build

      - name: Create IPA
        run: |
          cd ios/App
          find ~/Library/Developer/Xcode/DerivedData -name "App.app" -type d 2>/dev/null | head -1
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "App.app" -type d 2>/dev/null | head -1)
          if [ -n "$APP_PATH" ]; then
            mkdir -p Payload
            cp -R "$APP_PATH" Payload/App.app
            cd Payload
            zip -r ../App.ipa .
          fi

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app.ipa
          path: ios/App/App.ipa
