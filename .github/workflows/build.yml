name: Build iOS IPA

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install

      - name: Install CocoaPods
        run: cd ios/App && pod install

      - name: Build iOS
        uses: yukiarrr/ios-build-action@v1.4.0
        with:
          project-path: ios/App/App.xcodeproj
          scheme: App
          configuration: Debug
          code-signing-required: "false"
          output-path: output.ipa
          build-path: build

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: app.ipa
          path: output.ipa
